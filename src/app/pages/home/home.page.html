<ion-menu contentId="main-content">
  <ion-header>
    <ion-toolbar color="danger">
      <ion-title>Menu Content</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content>
  <ion-list-header>
    <ion-label>Academic</ion-label>
  </ion-list-header>
  <ion-list lines="none">
    <ion-item button>
      <ion-icon name="grid-outline" slot="start"></ion-icon>
      <ion-label>Dashboard</ion-label>
    </ion-item>
    <ion-item button>
      <ion-icon name="book-outline" slot="start"></ion-icon>
      <ion-label>Courses</ion-label>
    </ion-item>
    <ion-item button>
      <ion-icon name="calendar-number-outline" slot="start"></ion-icon>
      <ion-label>Deadlines</ion-label>
    </ion-item>
  </ion-list>

  <ion-list-header>
    <ion-label>Tools</ion-label>
  </ion-list-header>
  <ion-list lines="none">
    <ion-item button>
      <ion-icon name="timer-outline" slot="start"></ion-icon>
      <ion-label>Focus Timer</ion-label>
    </ion-item>
    <ion-item button>
      <ion-icon name="stats-chart-outline" slot="start"></ion-icon>
      <ion-label>Grade Tracker</ion-label>
    </ion-item>
  </ion-list>

  <ion-list lines="none" class="bottom-list">
    <ion-item button color="light">
      <ion-icon name="settings-outline" slot="start"></ion-icon>
      <ion-label>Settings</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
</ion-menu>
<div class="ion-page" id="main-content">
  <ion-header>
    <ion-toolbar color="danger">
      <ion-buttons slot="start">
        <ion-menu-button class="btn-menu"></ion-menu-button>
      </ion-buttons>
      <ion-title justify="center">Student Task Management</ion-title>
      <ion-avatar slot="end" class="ion-img">
        <img src="assets/icon/avatar.svg" alt="" />
      </ion-avatar>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <ion-card class="summary-card">
      <div class="text-section">
        <h1>Hii, Neha! </h1>
        <p>You're completed 60% of your tasks today.</p>
      </div>
      <div class="progress-container">
      <div class="circular-progress">
        <div class="inner-circle">
          <span class="percentage">60%</span>
        </div>
      </div>
    </div>
    </ion-card>
  </ion-content>
</div>
